<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理平台 - 情况反映</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  line-height: 1.6;
}

/* Header */
.admin-header {
  background: linear-gradient(135deg, #1a1a2e, #2d2d4e);
  color: #fff;
  padding: 16px 0;
}
.admin-header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.admin-header h1 { font-size: 20px; font-weight: 600; }
.admin-header a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
.admin-header a:hover { color: #fff; }

/* Container */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Stats */
.stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card {
  background: #fff;
  border-radius: 12px;
  padding: 18px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  flex: 1;
  min-width: 120px;
  text-align: center;
  border-top: 3px solid #c41e3a;
}
.stat-card .num { font-size: 28px; font-weight: 800; color: #c41e3a; }
.stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }

/* Filters */
.filters {
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filters select, .filters input {
  padding: 9px 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.filters select:focus, .filters input:focus { border-color: #c41e3a; }
.filters button {
  padding: 9px 18px;
  background: #c41e3a;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
.filters button:hover { background: #a01830; }

/* Table */
.table-wrap {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  background: #f8f9fa;
  padding: 12px 14px;
  text-align: left;
  font-weight: 600;
  color: #555;
  border-bottom: 2px solid #eee;
  white-space: nowrap;
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
tr:hover { background: #fafafa; }
.content-preview {
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
}
.status-待审核 { background: #fff3e0; color: #e65100; }
.status-已审核 { background: #e8f5e9; color: #2e7d32; }
.status-已处理 { background: #e3f2fd; color: #1565c0; }
.status-不采纳 { background: #ffebee; color: #c62828; }

.actions { display: flex; gap: 6px; }
.actions button {
  padding: 4px 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.actions .btn-edit:hover { background: #e3f2fd; border-color: #1976d2; color: #1976d2; }
.actions .btn-del:hover { background: #ffebee; border-color: #c62828; color: #c62828; }

.empty { text-align: center; padding: 40px; color: #aaa; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
.modal .form-group { margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
.modal select, .modal input, .modal textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}
.modal select:focus, .modal input:focus, .modal textarea:focus { border-color: #c41e3a; }
.modal textarea { min-height: 100px; resize: vertical; }
.modal .btns { display: flex; gap: 10px; margin-top: 24px; }
.modal .btns button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 500;
}
.btn-save { background: #c41e3a; color: #fff; }
.btn-save:hover { background: #a01830; }
.btn-cancel { background: #eee; color: #555; }
.btn-cancel:hover { background: #ddd; }

@media (max-width: 768px) {
  .stats-row { flex-direction: column; }
  .admin-header-inner { flex-direction: column; gap: 8px; }
}
</style>
</head>
<body>

<div class="admin-header">
  <div class="admin-header-inner">
    <h1>🔧 情况反映管理平台</h1>
    <div>
      <a href="report.html">📝 反映入口</a> &nbsp;|&nbsp;
      <a href="index.html">📋 通报数据库</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>

  <div class="filters">
    <select id="filterStatus">
      <option value="">全部状态</option>
      <option value="待审核">待审核</option>
      <option value="已审核">已审核</option>
      <option value="已处理">已处理</option>
      <option value="不采纳">不采纳</option>
    </select>
    <select id="filterCity">
      <option value="">全部市</option>
    </select>
    <input type="text" id="filterKeyword" placeholder="关键词搜索..." />
    <button onclick="loadReports()">🔍 筛选</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>市</th>
          <th>县/区</th>
          <th>反映单位</th>
          <th>情况内容</th>
          <th>状态</th>
          <th>提交时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>编辑反映</h2>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label>状态</label>
      <select id="editStatus">
        <option value="待审核">待审核</option>
        <option value="已审核">已审核</option>
        <option value="已处理">已处理</option>
        <option value="不采纳">不采纳</option>
      </select>
    </div>
    <div class="form-group">
      <label>市</label>
      <input type="text" id="editCity" />
    </div>
    <div class="form-group">
      <label>县/区</label>
      <input type="text" id="editDistrict" />
    </div>
    <div class="form-group">
      <label>反映单位</label>
      <input type="text" id="editUnit" />
    </div>
    <div class="form-group">
      <label>情况内容</label>
      <textarea id="editContent"></textarea>
    </div>
    <div class="form-group">
      <label>管理员备注</label>
      <textarea id="editNote" placeholder="审核意见或备注..."></textarea>
    </div>
    <div class="btns">
      <button class="btn-cancel" onclick="closeEdit()">取消</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
const FUJIAN_CITIES = ['福州市','厦门市','漳州市','泉州市','三明市','莆田市','南平市','龙岩市','宁德市','平潭综合实验区'];

const cityFilter = document.getElementById('filterCity');
FUJIAN_CITIES.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = c;
  cityFilter.appendChild(opt);
});

async function loadReports() {
  const params = new URLSearchParams();
  const status = document.getElementById('filterStatus').value;
  const city = document.getElementById('filterCity').value;
  const keyword = document.getElementById('filterKeyword').value.trim();
  if (status) params.set('status', status);
  if (city) params.set('city', city);
  if (keyword) params.set('keyword', keyword);

  const res = await fetch('/api/reports?' + params.toString());
  const data = await res.json();

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${data.total}</div><div class="label">总反映数</div></div>
    <div class="stat-card"><div class="num">${data.stats['待审核']||0}</div><div class="label">待审核</div></div>
    <div class="stat-card"><div class="num">${data.stats['已审核']||0}</div><div class="label">已审核</div></div>
    <div class="stat-card"><div class="num">${data.stats['已处理']||0}</div><div class="label">已处理</div></div>
    <div class="stat-card"><div class="num">${data.stats['不采纳']||0}</div><div class="label">不采纳</div></div>
  `;

  const tbody = document.getElementById('tableBody');
  if (!data.data || !data.data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无数据</td></tr>';
    return;
  }

  tbody.innerHTML = data.data.map(r => `
    <tr>
      <td>${r.id}</td>
      <td>${esc(r.city)}</td>
      <td>${esc(r.district)}</td>
      <td>${esc(r.unit)}</td>
      <td class="content-preview" title="${esc(r.content)}">${esc(r.content)}</td>
      <td><span class="status-badge status-${r.status}">${r.status}</span></td>
      <td>${r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '-'}</td>
      <td class="actions">
        <button class="btn-edit" onclick="openEdit(${r.id})">编辑</button>
        <button class="btn-del" onclick="delReport(${r.id})">删除</button>
      </td>
    </tr>
  `).join('');
}

async function openEdit(id) {
  const res = await fetch('/api/reports/' + id);
  const r = await res.json();
  document.getElementById('editId').value = r.id;
  document.getElementById('editStatus').value = r.status;
  document.getElementById('editCity').value = r.city;
  document.getElementById('editDistrict').value = r.district;
  document.getElementById('editUnit').value = r.unit;
  document.getElementById('editContent').value = r.content;
  document.getElementById('editNote').value = r.admin_note || '';
  document.getElementById('editModal').classList.add('show');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('show');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const body = {
    status: document.getElementById('editStatus').value,
    city: document.getElementById('editCity').value,
    district: document.getElementById('editDistrict').value,
    unit: document.getElementById('editUnit').value,
    content: document.getElementById('editContent').value,
    admin_note: document.getElementById('editNote').value
  };

  const res = await fetch('/api/reports/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    closeEdit();
    loadReports();
  } else {
    alert('保存失败');
  }
}

async function delReport(id) {
  if (!confirm('确定删除这条反映？此操作不可恢复。')) return;
  const res = await fetch('/api/reports/' + id, { method: 'DELETE' });
  if (res.ok) loadReports();
  else alert('删除失败');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEdit(); });
loadReports();
</script>
</body>
</html>
