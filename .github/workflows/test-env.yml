name: Test Environment

on:
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Test network access
      run: |
        echo "Testing network access..."
        curl -I -m 10 http://zzxszy.people.cn/GB/458759/index.html || echo "❌ Cannot access people.cn"
        curl -I -m 10 https://www.baidu.com || echo "❌ Cannot access baidu.com"
        
    - name: Test Firecrawl API
      env:
        FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      run: |
        echo "Testing Firecrawl API..."
        if [ -z "$FIRECRAWL_API_KEY" ]; then
          echo "❌ FIRECRAWL_API_KEY not set"
        else
          echo "✅ FIRECRAWL_API_KEY is set"
          curl -s -X POST https://api.firecrawl.dev/v1/scrape \
            -H "Authorization: Bearer $FIRECRAWL_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"url":"https://www.baidu.com","formats":["markdown"]}' | jq '.success' || echo "❌ Firecrawl API failed"
        fi
